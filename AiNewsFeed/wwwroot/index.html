<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bs-body-bg: #0f1115;
            --bs-body-color: #e0e0e0;
            --card-bg: #1a1d24;
            --border-color: #2a2e3a;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --success: #198754;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .navbar {
            background-color: #161920 !important;
            border-bottom: 1px solid var(--border-color);
        }

        .article-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

            .article-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            }

        .article-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            line-height: 1.4;
        }

            .article-title:hover {
                color: var(--accent);
            }

            .article-title.unread {
                color: #fff;
            }

            .article-title.read {
                color: #8b92a8;
                font-weight: 400;
            }

        .source-badge {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.35em 0.65em;
            border-radius: 6px;
        }

        .summary-text {
            color: #9ca3af;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .date-text {
            color: #6b7280;
            font-size: 0.8rem;
        }

        .btn-refresh {
            position: relative;
        }

            .btn-refresh .spinner-border {
                width: 1rem;
                height: 1rem;
                border-width: 0.15em;
            }

        .filter-bar {
            background-color: #161920;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 56px;
            z-index: 100;
        }

        .form-select, .form-control {
            background-color: #1a1d24;
            border-color: var(--border-color);
            color: #e0e0e0;
        }

            .form-select:focus, .form-control:focus {
                background-color: #1a1d24;
                border-color: var(--accent);
                color: #e0e0e0;
                box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
            }

        .toast-container {
            z-index: 1060;
        }

        .toast {
            background-color: var(--card-bg);
            border-color: var(--border-color);
        }

        .modal-content {
            background-color: var(--card-bg);
            border-color: var(--border-color);
        }

        .content-expand {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

            .content-expand.show {
                max-height: 1000px;
            }

        .read-checkbox {
            cursor: pointer;
        }

        #loadMoreBtn {
            display: none;
        }

            #loadMoreBtn.visible {
                display: inline-block;
            }

        .stats-badge {
            font-size: 0.85rem;
            font-weight: 500;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bs-body-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3f4b;
            border-radius: 4px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #4a5060;
            }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-cpu me-2"></i>AI News Feed
            </a>
            <div class="d-flex align-items-center gap-2">
                <button id="refreshBtn" class="btn btn-primary btn-refresh btn-sm">
                    <span class="spinner-border d-none" id="refreshSpinner"></span>
                    <i class="bi bi-arrow-clockwise" id="refreshIcon"></i>
                    <span class="d-none d-sm-inline ms-1">Refresh</span>
                </button>
                <button id="markAllReadBtn" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-check-all me-1"></i>Mark All Read
                </button>
                <span id="statsBadge" class="badge bg-secondary stats-badge">0 articles | 0 unread</span>
            </div>
        </div>
    </nav>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="container">
            <div class="row g-2 align-items-center">
                <div class="col-md-4">
                    <select id="sourceFilter" class="form-select form-select-sm">
                        <option value="">All Sources</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="unreadOnlyToggle">
                        <label class="form-check-label" for="unreadOnlyToggle">Unread Only</label>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search articles...">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <div id="articlesContainer" class="row g-3">
            <!-- Articles injected here -->
        </div>

        <div class="text-center mt-4 mb-5">
            <button id="loadMoreBtn" class="btn btn-outline-primary">
                Load More <i class="bi bi-chevron-down ms-1"></i>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 border-top" style="border-color: var(--border-color) !important; background-color: #161920;">
        <div class="container">
            <small class="text-muted">
                Last refreshed: <span id="lastRefreshed">never</span> |
                <span id="footerCount">0 total</span>
            </small>
        </div>
    </footer>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="mainToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">Message</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Shortcuts Modal -->
    <div class="modal fade" id="shortcutsModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Keyboard Shortcuts</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex justify-content-between mb-2"><kbd>R</kbd> <span>Refresh feeds</span></div>
                    <div class="d-flex justify-content-between mb-2"><kbd>M</kbd> <span>Mark all read</span></div>
                    <div class="d-flex justify-content-between mb-2"><kbd>?</kbd> <span>Show shortcuts</span></div>
                    <div class="d-flex justify-content-between"><kbd>Esc</kbd> <span>Dismiss modal</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>// State
        let currentPage = 1;
        let currentSource = '';
        let currentUnreadOnly = false;
        let currentSearch = '';
        let isLoading = false;
        let hasMore = true;
        let lastRefreshTime = null;
        let searchTimeout = null;
        let isRefreshing = false;
        let refreshTimeout = null;
        const pageSize = 50;

        // Source color map
        const sourceColors = {};
        const colorPalette = [
            '#0d6efd', '#6610f2', '#6f42c1', '#d63384', '#dc3545',
            '#fd7e14', '#ffc107', '#198754', '#20c997', '#0dcaf0',
            '#e83e8c', '#6c757d', '#7952b3', '#17a2b8', '#28a745',
            '#fd7e14', '#6f42c1'
        ];

        // DOM Elements
        const articlesContainer = document.getElementById('articlesContainer');
        const refreshBtn = document.getElementById('refreshBtn');
        const refreshSpinner = document.getElementById('refreshSpinner');
        const refreshIcon = document.getElementById('refreshIcon');
        const markAllReadBtn = document.getElementById('markAllReadBtn');
        const statsBadge = document.getElementById('statsBadge');
        const sourceFilter = document.getElementById('sourceFilter');
        const unreadOnlyToggle = document.getElementById('unreadOnlyToggle');
        const searchInput = document.getElementById('searchInput');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const lastRefreshed = document.getElementById('lastRefreshed');
        const footerCount = document.getElementById('footerCount');
        const toastEl = document.getElementById('mainToast');
        const toastBody = document.getElementById('toastBody');
        const toast = new bootstrap.Toast(toastEl);
        const shortcutsModal = new bootstrap.Modal(document.getElementById('shortcutsModal'));

        // Helpers
        function showToast(message, type = 'info') {
            toastBody.textContent = message;
            toastEl.className = 'toast align-items-center';
            if (type === 'success') toastEl.classList.add('bg-success', 'text-white');
            else if (type === 'error') toastEl.classList.add('bg-danger', 'text-white');
            else if (type === 'warning') toastEl.classList.add('bg-warning', 'text-dark');
            else toastEl.classList.add('bg-secondary', 'text-white');
            toast.show();
        }

        function getSourceColor(sourceName) {
            if (!sourceColors[sourceName]) {
                const index = Object.keys(sourceColors).length % colorPalette.length;
                sourceColors[sourceName] = colorPalette[index];
            }
            return sourceColors[sourceName];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} min ago`;
            if (diffHours < 24) return `${diffHours} hr ago`;
            if (diffDays === 1) return 'Yesterday';

            const options = { month: 'short', day: 'numeric' };
            if (date.getFullYear() !== now.getFullYear()) {
                options.year = 'numeric';
            }
            return date.toLocaleDateString('en-US', options);
        }

        function truncate(str, len) {
            if (!str) return '';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }

        // API Calls
        async function fetchArticles(reset = false) {
            if (isLoading) return;
            isLoading = true;

            if (reset) {
                currentPage = 1;
                hasMore = true;
                articlesContainer.innerHTML = '';
            }

            const params = new URLSearchParams({
                page: currentPage,
                pageSize: pageSize
            });
            if (currentSource) params.append('source', currentSource);
            if (currentUnreadOnly) params.append('unread', 'true');
            if (currentSearch) params.append('search', currentSearch);

            try {
                const response = await fetch(`/api/articles?${params}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const articles = await response.json();
                const totalCount = response.headers.get('X-Total-Count') || articles.length;

                if (articles.length === 0) {
                    hasMore = false;
                    if (reset) {
                        articlesContainer.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-inbox fs-1"></i><p class="mt-2">No articles found.</p></div>';
                    }
                } else {
                    renderArticles(articles);
                    hasMore = articles.length === pageSize;
                }

                loadMoreBtn.classList.toggle('visible', hasMore && articles.length > 0);
                updateStats(totalCount, articles.filter(a => !a.isRead).length);
                footerCount.textContent = `${totalCount} total`;

            } catch (err) {
                console.error('Fetch articles error:', err);
                if (reset) {
                    articlesContainer.innerHTML = '<div class="text-center text-danger py-5"><i class="bi bi-exclamation-triangle fs-1"></i><p class="mt-2">Failed to load articles.</p></div>';
                }
            } finally {
                isLoading = false;
            }
        }

        async function fetchSources() {
            try {
                const response = await fetch('/api/sources');
                if (!response.ok) throw new Error();
                const sources = await response.json();

                sourceFilter.innerHTML = '<option value="">All Sources</option>';
                sources.filter(s => s.isActive).forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.name;
                    opt.textContent = s.name;
                    sourceFilter.appendChild(opt);
                });
            } catch (err) {
                console.error('Fetch sources error:', err);
            }
        }

        async function refreshFeeds() {
            if (isRefreshing) return;

            setRefreshLoading(true);

            // Failsafe: force reset after 60 seconds no matter what
            refreshTimeout = setTimeout(() => {
                console.warn('Refresh timeout hit — forcing button reset');
                setRefreshLoading(false);
            }, 60000);

            try {
                const response = await fetch('/api/feeds/refresh', { method: 'POST' });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                lastRefreshTime = new Date();
                updateLastRefreshed();

                let msg = `Added ${result.newArticlesAdded} new articles.`;
                if (result.failedSources > 0) msg += ` ${result.failedSources} source(s) failed.`;
                if (result.disabledSources > 0) msg += ` ${result.disabledSources} source(s) disabled.`;

                showToast(msg, result.failedSources > 0 ? 'warning' : 'success');

                // Reload articles and sources
                await fetchArticles(true);
                await fetchSources();

            } catch (err) {
                console.error('Refresh error:', err);
                if (err.message && err.message.includes('fetch')) {
                    showToast('Could not connect to backend. Is the app running?', 'error');
                } else {
                    showToast('Refresh failed: ' + err.message, 'error');
                }
            } finally {
                setRefreshLoading(false);
            }
        }

        async function markArticleRead(id, isRead) {
            try {
                const response = await fetch(`/api/articles/${id}/read`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isRead })
                });
                if (!response.ok) throw new Error();
                return true;
            } catch (err) {
                console.error('Mark read error:', err);
                return false;
            }
        }

        async function markAllRead() {
            try {
                const response = await fetch('/api/articles/read-all', { method: 'PATCH' });
                if (!response.ok) throw new Error();
                const result = await response.json();
                showToast(`Marked ${result.markedCount} articles as read.`, 'success');
                await fetchArticles(true);
            } catch (err) {
                showToast('Failed to mark all as read.', 'error');
            }
        }

        // Rendering
        function renderArticles(articles) {
            articles.forEach(article => {
                const col = document.createElement('div');
                col.className = 'col-12';

                const color = getSourceColor(article.source);
                const readClass = article.isRead ? 'read' : 'unread';
                const hasContent = article.content && article.content.length > article.summary?.length;

                col.innerHTML = `
                    <div class="article-card p-3 p-md-4" data-id="${article.id}">
                        <div class="d-flex align-items-start gap-3">
                            <div class="form-check mt-1">
                                <input class="form-check-input read-checkbox" type="checkbox"
                                    ${article.isRead ? 'checked' : ''}
                                    title="${article.isRead ? 'Mark unread' : 'Mark read'}"
                                    onchange="handleCheckboxChange(${article.id}, this.checked)">
                            </div>
                            <div class="flex-grow-1 min-width-0">
                                <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
                                    <span class="source-badge text-white" style="background-color: ${color};">${article.source}</span>
                                    <span class="date-text"><i class="bi bi-clock me-1"></i>${formatDate(article.publishedAt)}</span>
                                    ${article.author ? `<span class="date-text"><i class="bi bi-person me-1"></i>${article.author}</span>` : ''}
                                </div>
                                <a href="${article.url}" target="_blank" rel="noopener"
                                   class="article-title ${readClass} d-block mb-2"
                                   onclick="handleTitleClick(${article.id}, event)">
                                    ${article.title}
                                </a>
                                ${article.summary ? `<p class="summary-text mb-0">${truncate(article.summary, 200)}</p>` : ''}
                                ${hasContent ? `
                                    <button class="btn btn-link btn-sm text-decoration-none ps-0 mt-2"
                                            onclick="toggleContent(this, ${article.id})">
                                        <i class="bi bi-chevron-down"></i> Read more
                                    </button>
                                    <div class="content-expand mt-2" id="content-${article.id}">
                                        <div class="p-3 rounded" style="background-color: #12141a; border: 1px solid var(--border-color);">
                                            ${article.content}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                articlesContainer.appendChild(col);
            });
        }

        function updateStats(total, unread) {
            statsBadge.textContent = `${total} articles | ${unread} unread`;
        }

        function updateLastRefreshed() {
            if (!lastRefreshTime) {
                lastRefreshed.textContent = 'never';
                return;
            }
            lastRefreshed.textContent = formatDate(lastRefreshTime);
        }

        function setRefreshLoading(loading) {
            isRefreshing = loading;
            refreshBtn.disabled = loading;

            if (loading) {
                refreshSpinner.classList.remove('d-none');
                refreshIcon.classList.add('d-none');
            } else {
                refreshSpinner.classList.add('d-none');
                refreshIcon.classList.remove('d-none');
                // Clear any pending failsafe timeout
                if (refreshTimeout) {
                    clearTimeout(refreshTimeout);
                    refreshTimeout = null;
                }
            }
        }

        // Event Handlers
        window.handleCheckboxChange = async function(id, checked) {
            const success = await markArticleRead(id, checked);
            if (success) {
                const titleEl = document.querySelector(`[data-id="${id}"] .article-title`);
                if (titleEl) {
                    titleEl.classList.remove('unread', 'read');
                    titleEl.classList.add(checked ? 'read' : 'unread');
                }
                // Refresh stats
                fetchArticles(true);
            }
        };

        window.handleTitleClick = async function(id, event) {
            const success = await markArticleRead(id, true);
            if (success) {
                const titleEl = event.target;
                titleEl.classList.remove('unread');
                titleEl.classList.add('read');
                const checkbox = document.querySelector(`[data-id="${id}"] .read-checkbox`);
                if (checkbox) checkbox.checked = true;
            }
        };

        window.toggleContent = function(btn, id) {
            const content = document.getElementById(`content-${id}`);
            const icon = btn.querySelector('i');
            const isExpanded = content.classList.contains('show');

            if (isExpanded) {
                content.classList.remove('show');
                icon.classList.remove('bi-chevron-up');
                icon.classList.add('bi-chevron-down');
                btn.innerHTML = btn.innerHTML.replace('Read less', 'Read more');
            } else {
                content.classList.add('show');
                icon.classList.remove('bi-chevron-down');
                icon.classList.add('bi-chevron-up');
                btn.innerHTML = btn.innerHTML.replace('Read more', 'Read less');
            }
        };

        // Event Listeners
        refreshBtn.addEventListener('click', refreshFeeds);
        markAllReadBtn.addEventListener('click', markAllRead);

        sourceFilter.addEventListener('change', (e) => {
            currentSource = e.target.value;
            fetchArticles(true);
        });

        unreadOnlyToggle.addEventListener('change', (e) => {
            currentUnreadOnly = e.target.checked;
            fetchArticles(true);
        });

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearch = e.target.value;
                fetchArticles(true);
            }, 300);
        });

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            fetchArticles(false);
        });

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch (e.key.toLowerCase()) {
                case 'r':
                    e.preventDefault();
                    if (!isRefreshing) refreshFeeds();
                    break;
                case 'm':
                    e.preventDefault();
                    markAllRead();
                    break;
                case '?':
                    e.preventDefault();
                    shortcutsModal.show();
                    break;
                case 'escape':
                    shortcutsModal.hide();
                    break;
            }
        });

        // Init
        async function init() {
            await fetchSources();
            await fetchArticles(true);
            updateLastRefreshed();

            // Update "last refreshed" text every minute
            setInterval(updateLastRefreshed, 60000);
        }

        init();</script>
</body>
</html>
