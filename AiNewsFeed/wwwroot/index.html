<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-cpu me-2"></i>AI News Feed
            </a>
            <div class="d-flex align-items-center gap-2">
                <button id="refreshBtn" class="btn btn-primary btn-sm position-relative">
                    <span class="spinner-border spinner-border-sm d-none" id="refreshSpinner"></span>
                    <i class="bi bi-arrow-clockwise" id="refreshIcon"></i>
                    <span class="d-none d-sm-inline ms-1">Refresh</span>
                </button>
                <button id="markAllReadBtn" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-check-all me-1"></i>Mark All Read
                </button>
                <span id="statsBadge" class="badge bg-secondary">0 articles | 0 unread</span>
            </div>
        </div>
    </nav>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="container">
            <div class="row g-2 align-items-end">
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Source</label>
                    <select id="sourceFilter" class="form-select form-select-sm">
                        <option value="">All Sources</option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Model</label>
                    <select id="modelFilter" class="form-select form-select-sm">
                        <option value="">All Models</option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Company</label>
                    <select id="companyFilter" class="form-select form-select-sm">
                        <option value="">All Companies</option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <div class="form-check form-switch mt-3">
                        <input class="form-check-input" type="checkbox" id="unreadOnlyToggle">
                        <label class="form-check-label" for="unreadOnlyToggle">Unread Only</label>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search articles...">
                        <button class="btn btn-outline-secondary" type="button" id="clearSearchBtn"><i class="bi bi-x"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container py-4">
        <div id="articlesContainer" class="row g-3">
            <!-- Articles injected here -->
        </div>

        <div class="text-center mt-4 mb-5">
            <button id="loadMoreBtn" class="btn btn-outline-primary">
                Load More <i class="bi bi-chevron-down ms-1"></i>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-3 border-top" style="border-color: var(--border-color) !important; background-color: #161920;">
        <div class="container">
            <small class="text-muted">
                Last refreshed: <span id="lastRefreshed">never</span> |
                <span id="footerCount">0 total</span>
            </small>
        </div>
    </footer>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="mainToast" class="toast align-items-center text-white bg-secondary" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody">Message</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
